name: Coupang Auto Capture

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install --no-save playwright@^1.53.0
          npx playwright install --with-deps chromium

      - name: Capture Coupang used statuses
        run: npm run capture
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit result
        run: |
          git config user.name "coupang-auto-bot"
          git config user.email "coupang-auto-bot@users.noreply.github.com"
          git add result.json
          git diff --cached --quiet && echo "No changes" || git commit -m "Update coupang result"
          git push
