<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>쿠팡 반품 판매 DB</title>
  <style>
    body{margin:0;background:#f7f7f8;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;color:#111}
    .app{max-width:430px;margin:0 auto;padding:16px}
    .hero{background:#fff;border-radius:0 0 28px 28px;padding:18px 14px;margin:0 -2px 22px;box-shadow:0 12px 28px rgba(0,0,0,.07)}
    h1{margin:0;font-size:22px;letter-spacing:-1px}
    .desc{font-size:12.5px;color:#666;line-height:1.45;margin:10px 0 12px}
    .notice{font-size:11px;color:#777}
    .section{margin-bottom:24px}
    .section h2{font-size:20px;margin:0 0 10px 6px}
    .table{background:#fff;border:1px solid #e5e5e5;border-radius:20px;overflow:hidden}
    .grid{display:grid}
    .cell{min-height:56px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:center;text-align:center;font-size:11px;padding:5px 2px}
    .head{font-weight:700;background:#fff}
    .row{background:#fbfbfc;font-weight:700;line-height:1.15}
    .x{color:#d71920;font-size:22px;font-weight:800}
    .prod{flex-direction:column;gap:4px}
    .btn{background:#000;color:#fff;border-radius:999px;padding:7px 12px;font-size:11px;font-weight:700;text-decoration:none}
    .hot{color:#ff5a00;font-size:10px;font-weight:800}
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1>쿠팡 반품 판매 DB</h1>
    <p class="desc">자동확보 결과를 읽어 확보된 상품만 표시합니다.</p>
    <div class="notice" id="notice">최근 확인: -</div>
  </div>

  <div id="root"></div>
</div>

<script>
const CATALOG = [
  {
    key:"iphone16pro",
    title:"📱 iPhone 16 Pro 반품상품",
    rowTitle:"색상",
    columns:["128GB","256GB","512GB","1TB"],
    rows:["블랙 티타늄","내추럴 티타늄","데저트 티타늄","화이트 티타늄"]
  },
  {
    key:"iphone16promax",
    title:"📱 iPhone 16 Pro Max 반품상품",
    rowTitle:"색상",
    columns:["256GB","512GB","1TB"],
    rows:["블랙 티타늄","내추럴 티타늄","데저트 티타늄","화이트 티타늄"]
  },
  {
    key:"ipadpro",
    title:"💻 iPad Pro M4 / M5 반품상품",
    rowTitle:"모델",
    columns:["256GB","512GB","1TB","2TB"],
    rows:["iPad Pro 11 M4","iPad Pro 13 M4","iPad Pro 11 M5","iPad Pro 13 M5"]
  }
];

let DB = {};

async function load(){
  const res = await fetch(`result.json?t=${Date.now()}`, {cache:"no-store"});
  DB = await res.json();
  render();
}

function makeIndex(){
  const idx = {};
  const items = DB.items || {};
  for(const id of Object.keys(items)){
    const item = items[id];
    const key = `${item.model || ""}__${item.color || ""}__${item.storage || ""}`;
    idx[key] = item;
  }
  return idx;
}

function rowLabel(t){
  return t
    .replace(" 티타늄","<br>티타늄")
    .replace("iPad Pro 11 M4","iPad Pro<br>11 M4")
    .replace("iPad Pro 13 M4","iPad Pro<br>13 M4")
    .replace("iPad Pro 11 M5","iPad Pro<br>11 M5")
    .replace("iPad Pro 13 M5","iPad Pro<br>13 M5");
}

function gridTemplate(s){
  if(s.columns.length===3) return ".85fr repeat(3,1fr)";
  return ".85fr repeat(4,1fr)";
}

function render(){
  const idx = makeIndex();
  const all = Object.values(DB.items || {});
  const hits = all.filter(x => Number(x.count || 0) > 0);
  const total = hits.reduce((s,x)=>s+Number(x.count||0),0);

  document.getElementById("notice").textContent =
    `최근 확인: ${DB.updatedAt || "-"} · 확보 상품 ${hits.length}개 · 등급 ${total}종`;

  document.getElementById("root").innerHTML = CATALOG.map(section=>{
    let html = `
      <div class="section">
        <h2>${section.title}</h2>
        <div class="table">
          <div class="grid" style="grid-template-columns:${gridTemplate(section)}">
            <div class="cell head">${section.rowTitle}</div>
            ${section.columns.map(c=>`<div class="cell head">${c}</div>`).join("")}
    `;

    for(const row of section.rows){
      html += `<div class="cell row">${rowLabel(row)}</div>`;

      for(const col of section.columns){
        const item = idx[`${section.key}__${row}__${col}`];

        if(item && Number(item.count||0) > 0){
          html += `
            <div class="cell prod">
              <a class="btn" href="${item.links[0]}" target="_blank">열기</a>
              <div class="hot">확보 ${item.count}종</div>
            </div>
          `;
        } else {
          html += `<div class="cell"><div class="x">×</div></div>`;
        }
      }
    }

    html += `</div></div></div>`;
    return html;
  }).join("");
}

load();
</script>
</body>
</html>
